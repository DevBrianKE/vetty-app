<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail - Vetty</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-green-600">Vetty</h1>
        <nav class="space-x-6 text-sm font-medium">
            <a href="../index.html" class="text-green-700 hover:text-green-600">Home</a>
            <a href="products.html" class="text-green-700 hover:text-green-600">Products</a>
            <a href="cart.html" class="text-green-700 hover:text-green-600">Cart</a>
        </nav>
    </div>
</header>

<section class="max-w-4xl mx-auto px-6 py-12">
    <div id="product-detail" class="bg-white p-6 rounded-lg shadow flex flex-col md:flex-row gap-6"></div>
</section>

<script src="../js/app.js"></script>
<script>
async function loadProductDetail() {
    const container = document.getElementById("product-detail");
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
        container.innerHTML = "<p class='text-red-500'>No product selected.</p>";
        return;
    }

    try {
        const res = await fetch(`http://127.0.0.1:5000/products/${id}`);
        if (!res.ok) throw new Error("Failed to fetch product");
        const product = await res.json();

        const safeName = product.name.replace(/'/g, "\\'");
        const imageUrl = product.image_url || 'https://via.placeholder.com/400x300?text=No+Image';

        container.innerHTML = `
            <img src="${imageUrl}" alt="${product.name}" class="w-full md:w-1/2 h-auto rounded">
            <div class="flex-1 flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-bold mb-3">${product.name}</h2>
                    <p class="text-gray-600 mb-4">${product.description || "No description available."}</p>
                    <p class="text-green-600 text-2xl font-semibold mb-6">$${product.price}</p>
                </div>
                <button onclick="addToCart(${product.id}, '${safeName}', ${product.price})"
                    class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-500 transition self-start">
                    Add to Cart 🛒
                </button>
            </div>
        `;
    } catch (err) {
        container.innerHTML = "<p class='text-red-500'>Failed to load product. Try again later.</p>";
        console.error(err);
    }
}

document.addEventListener("DOMContentLoaded", loadProductDetail);
</script>
</body>
</html>
