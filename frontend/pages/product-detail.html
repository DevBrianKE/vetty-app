<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail - Vetty</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<header class="bg-white shadow-sm mb-6">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
        <h1 class="text-xl font-bold text-green-600">Vetty</h1>
        <a href="products.html" class="text-green-600 hover:underline">← Back to Products</a>
    </div>
</header>

<!-- Product Container -->
<div id="product-detail" class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow text-center">
    <p class="text-gray-500">Loading product...</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

// 🚨 If no ID → stop immediately
if (!productId) {
    document.getElementById("product-detail").innerHTML = `
        <p class="text-red-500 font-semibold">No product selected.</p>
    `;
} else {
    fetch(`http://127.0.0.1:5000/products/${productId}`)
    .then(res => {
        if (!res.ok) {
            throw new Error("Product not found");
        }
        return res.json();
    })
    .then(product => {
        const container = document.getElementById("product-detail");

        const imageUrl = product.image_url || "https://via.placeholder.com/400x300?text=No+Image";

        container.innerHTML = `
            <img src="${imageUrl}" alt="${product.name}" class="w-full h-64 object-cover rounded mb-4">

            <h2 class="text-3xl font-bold mb-3">${product.name}</h2>

            <p class="text-gray-600 mb-4">${product.description || "No description available."}</p>

            <p class="text-green-600 text-2xl font-semibold mb-3">$${product.price}</p>

            <p class="text-gray-700 mb-6">Stock: ${product.stock}</p>

            <button onclick="addToCart(${product.id}, '${product.name}', ${product.price})"
                class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-500 transition">
                Add to Cart 🛒
            </button>
        `;
    })
    .catch(err => {
        document.getElementById("product-detail").innerHTML = `
            <p class="text-red-500 font-semibold">Product not found or server error.</p>
        `;
    });
}
</script>

<script src="../js/app.js"></script>
</body>
</html>
