<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Detail</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<header class="bg-white shadow-sm mb-6">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
        <h1 class="text-xl font-bold text-green-600">Vetty</h1>
        <a href="products.html" class="text-green-600">← Back</a>
    </div>
</header>

<div id="product-detail" class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow"></div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

fetch(`http://127.0.0.1:5000/products`)
.then(res => res.json())
.then(products => {
    const product = products.find(p => p.id == productId);

    document.getElementById("product-detail").innerHTML = `
        <h2 class="text-3xl font-bold mb-4">${product.name}</h2>
        <p class="text-gray-600 mb-4">${product.description}</p>
        <p class="text-green-600 text-xl font-semibold mb-6">$${product.price}</p>

        <button onclick="addToCart(${product.id}, '${product.name}', ${product.price})"
            class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-500 transition">
            Add to Cart
        </button>
    `;
});
</script>

<script src="../js/app.js"></script>
</body>
</html>
