<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart - Vetty</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
        <h1 class="text-xl font-bold text-green-600">Vetty</h1>
        <a href="products.html" class="text-green-600">← Continue Shopping</a>
    </div>
</header>

<!-- Cart Section -->
<section class="max-w-4xl mx-auto px-6 py-10">
    <h2 class="text-2xl font-bold mb-6">Your Cart 🛒</h2>

    <div id="cart-items" class="space-y-4"></div>

    <!-- Total -->
    <div class="mt-8 p-6 bg-white rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-2">Total:</h3>
        <p id="cart-total" class="text-2xl text-green-600 font-bold">$0</p>

        <button class="mt-4 w-full bg-green-600 text-white py-3 rounded hover:bg-green-500 transition">
            Proceed to Checkout
        </button>
    </div>
</section>

<script src="../js/app.js"></script>
<script>
loadCart();
</script>

</body>
</html>
