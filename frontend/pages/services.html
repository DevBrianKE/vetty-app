<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services - Vetty</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<header class="bg-white shadow-sm mb-6">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-green-600">Vetty</h1>
    <nav class="space-x-6 text-sm font-medium">
      <a href="index.html" class="text-green-700 hover:text-green-600">Home</a>
      <a href="products.html" class="text-green-700 hover:text-green-600">Products</a>
      <a href="services.html" class="text-green-700 font-bold">Services</a>
    </nav>
  </div>
</header>
<section class="max-w-7xl mx-auto px-6 py-12">
  <h2 class="text-2xl font-bold mb-8 text-center">Our Services</h2>
  <div id="service-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</section>
<script src="../js/app.js"></script>
<script>
const serviceList = document.getElementById("service-list");
async function loadServices() {
  try {
    const res = await fetch("http://127.0.0.1:5000/services");
    const services = await res.json();
    serviceList.innerHTML = "";
    services.forEach(s => {
      const div = document.createElement("div");
      div.className = "bg-white p-4 rounded-lg shadow flex flex-col justify-between";
      div.innerHTML = `
        <h3 class="font-bold text-lg mb-1">${s.name}</h3>
        <p class="text-gray-500 mb-2">${s.description || "No description."}</p>
        <p class="text-green-600 font-semibold mb-2">$${s.price}</p>
        <a href="service-detail.html?id=${s.id}" class="text-green-600 hover:underline font-medium mt-auto">Book Now</a>`;
      serviceList.appendChild(div);
    });
  } catch (err) { console.error(err); }
}
loadServices();
</script>
</body>
</html>
