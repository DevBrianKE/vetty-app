<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-green-600">Vetty</h1>
        <nav class="space-x-6 text-sm font-medium">
            <a href="index.html" class="text-green-700 hover:text-green-600 transition">Home</a>
            <a href="pages/products.html" class="text-green-700 hover:text-green-600 transition">Products</a>
            <a href="pages/services.html" class="text-green-700 hover:text-green-600 transition">Services</a>
            <a href="pages/cart.html" class="text-green-700 hover:text-green-600 transition">Cart</a>
            <a href="pages/login.html" class="text-green-700 hover:text-green-600 transition">Login</a>
        </nav>
    </div>
</header>

<!-- Hero -->
<section class="bg-gradient-to-r from-green-500 to-green-600 text-white">
    <div class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">Care for Your Pets, the Smart Way 🐾</h2>
        <p class="text-lg opacity-90 mb-6">Shop products, book services, and manage everything in one place.</p>
        <a href="pages/products.html" class="bg-white text-green-600 px-6 py-3 rounded-lg font-semibold hover:bg-gray-100 transition">Shop Now</a>
    </div>
</section>

<!-- Featured Products -->
<section class="max-w-7xl mx-auto px-6 py-12 bg-gray-50">
    <h2 class="text-2xl font-bold mb-8 text-center">Featured Products</h2>
    <div id="featured-products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 text-center"></div>
</section>

<!-- Featured Services -->
<section class="max-w-7xl mx-auto px-6 py-12 bg-gray-100">
    <h2 class="text-2xl font-bold mb-8 text-center">Featured Services</h2>
    <div id="featured-services" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 text-center"></div>
</section>

<footer class="bg-white border-t mt-10">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-500">
        © 2026 Vetty. All rights reserved.
    </div>
</footer>

<script src="js/home.js"></script>
</body>
</html>
